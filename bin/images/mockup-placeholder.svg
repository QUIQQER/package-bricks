<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-label="Placeholder – no image provided">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12"
                    flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#eef2f7"/>

  <!-- Placeholder Frame -->
  <g filter="url(#softShadow)">
    <rect x="135" y="90" width="630" height="420" rx="32"
          fill="#ffffff"
          stroke="#9aa8bd"
          stroke-width="8"
          stroke-dasharray="18 14"/>
  </g>

  <!-- Image Icon -->
  <g transform="translate(450 300)" fill="none" stroke="#9aa8bd" stroke-width="10" stroke-linejoin="round">
    <!-- inner image frame -->
    <rect x="-190" y="-130" width="380" height="260" rx="20"/>

    <!-- mountain -->
    <path d="M -150 70 L -70 -25 L 0 45 L 80 -15 L 150 70"/>

    <!-- sun -->
